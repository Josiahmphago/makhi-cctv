name: makhi_cctv
description: "A township safety and communication app using Flutter, Firebase, and ESP32-CAM integration."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # Core UI & utilities
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  intl: ^0.20.2
  uuid: ^4.5.1
  http: ^1.2.2
  path_provider: ^2.1.5
  #share_plus: ^12.0.1
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  webview_flutter: ^4.7.0
  google_maps_flutter: ^2.6.0
  

  # Camera & media
  camera: ^0.11.1
  image_picker: ^1.1.2
  image_gallery_saver_plus: ^4.0.1
  video_player: ^2.9.3
  flutter_vlc_player: ^7.4.3
  network_info_plus: ^6.0.0

  # Firebase
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  firebase_messaging: ^16.0.4
  firebase_app_check: ^0.4.1+2
 # firebase_app_check: ^0.3.0+3

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Device features
  geolocator: ^14.0.2
  permission_handler: ^12.0.0+1
  connectivity_plus: ^7.0.0
  flutter_contacts: ^1.1.7
  multi_select_flutter: ^4.1.3
  dart_geohash: ^2.1.0
  geocoding: ^3.0.0


  # Alerts / background
  flutter_local_notifications: ^19.5.0
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.0
  flutter_background_service_ios: ^5.0.3

  # Data viz & docs
  fl_chart: ^0.69.0
  speech_to_text: ^7.0.0
  excel: ^4.0.6
  pdf: ^3.11.1
  printing: ^5.13.1

  # Security
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/emergency.png
    - assets/icons/contacts.png
    - assets/icons/settings.png
    - assets/icons/chat_bubble.png
    - assets/icons/message.png
